<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting to LCE Docs</title>
  <script>
    // Redirect any old lcemp-docs path to the equivalent lce-docs path
    var newPath = window.location.pathname.replace('/lcemp-docs', '/lce-docs');
    window.location.replace('https://coah80.github.io' + newPath + window.location.hash);
  </script>
  <meta http-equiv="refresh" content="1; url=https://coah80.github.io/lce-docs/">
</head>
<body>
  <p>Redirecting to <a href="https://coah80.github.io/lce-docs/">LCE Docs</a>...</p>
</body>
</html>
